name: Publish to npm

on:
  release:
    types: [published] # Triggers automatically when you publish a GitHub Release
  workflow_dispatch: # Also allows manual triggering from the Actions tab
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Sync the package.json version with the GitHub Release tag (e.g. v1.2.0 → 1.2.0)
      - name: Sync version from release tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"   # Strip the leading 'v'
          npm pkg set version="$VERSION"
          echo "Publishing version: $VERSION"

      - name: Publish to npm
        run: npm publish --provenance --access public
